name: Update Tracking Data

on:
  # each Monday at 9am
  schedule:
    - cron: "0 9 * * 1"
    # manual trigger
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}

      # clone tracker-radar from DuckDuckGo repo (DuckDuckGo, Inc., 2025)
      - name: Clone DuckDuckGo Tracker Radar
        run: |
          git clone https://github.com/duckduckgo/tracker-radar.git

      # clone Consent-O-Matic repo (Nouwens und Nylandsted Klokmose, 2025)
      - name: Clone Consent-O-Matic
        run: |
          git clone https://github.com/cavi-au/Consent-O-Matic.git consent-o-matic

      # clone Open Cookie Database repo (Kwakman, 2023)
      - name: Clone Open Cookie Database
        run: |
          git clone https://github.com/jkwakman/Open-Cookie-Database.git open-cookie-database

      # install node to run extract script
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # run extract script
      - name: Run extract script
        run: node extract.js

     #  push to extension repos
      - name: Push updated TS files to detecta repo
        run: |
          git clone https://${{ secrets.ACTIONS_TOKEN }}@github.com/leolivi/detecta.git detecta
          cp dist/tracker-core.json detecta/src/data/
          cp dist/tracker-extended.json detecta/src/data/
          cd detecta
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/tracker-core.json src/data/tracker-extended.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update tracker radar data (core + extended)"
            git push
          fi

      - name: Push updated TS files to klartxt repo
        run: |
          git clone https://${{ secrets.ACTIONS_TOKEN }}@github.com/leolivi/klartxt.git klartxt
          cp dist/tracker-core.json klartxt/src/data/trackers/
          cp dist/tracker-extended.json klartxt/src/data/trackers/
          cp dist/fingerprint-domains.json klartxt/src/data/trackers/
          cp dist/tracking-params.json klartxt/src/data/trackers/
          cp dist/cmp-selectors.json klartxt/src/data/dsgvo/
          cp dist/cookie-heuristics.json klartxt/src/data/cookies/
          cd klartxt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/trackers/tracker-core.json src/data/trackers/tracker-extended.json src/data/trackers/fingerprint-domains.json src/data/trackers/tracking-params.json src/data/dsgvo/cmp-selectors.json src/data/cookies/cookie-heuristics.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update tracker radar data"
            git push
          fi
